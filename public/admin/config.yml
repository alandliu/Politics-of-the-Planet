# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: alandliu/Politics-of-the-Planet
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/6407ece2-f6ab-46bc-94b5-748f9a564b7f/pkce
  auth_token_endpoint: /sites/6407ece2-f6ab-46bc-94b5-748f9a564b7f/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://politicsoftheplanet.netlify.app


local_backend: true

media_folder: "public/uploads/entries"
public_folder: "/uploads/entries"

collections:
  - name: "writings"
    label: "Writings"
    label_singular: "Writing"
    folder: "content/writings"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}  —  {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - {
          label: "One-line summary",
          name: "summary",
          widget: "string",
          required: false,
          hint: "Shown under the title on the home page.",
        }
      - {
          label: "Student explainer (PDF)",
          name: "explainerPdf",
          widget: "file",
          required: false,
          media_library: { config: { max_file_size: 20000000 } },
          hint: "The plain-language / kid-friendly PDF.",
        }
      - {
          label: "Policy brief / research paper (PDF)",
          name: "briefPdf",
          widget: "file",
          required: false,
          media_library: { config: { max_file_size: 20000000 } },
        }
      - {
          label: "Slides (PDF)",
          name: "slidesPdf",
          widget: "file",
          required: false,
          media_library: { config: { max_file_size: 20000000 } },
          hint: "Export the deck to PDF (File > Download > PDF) and upload it.",
        }
      - label: "References (PDFs)"
        name: "references"
        widget: "list"
        required: false
        label_singular: "Reference"
        summary: "{{fields.label}}"
        hint: "Add one row per reference. Each appears collapsed until a reader clicks it."
        fields:
          - { label: "Reference name", name: "label", widget: "string" }
          - {
              label: "Citation (optional)",
              name: "citation",
              widget: "string",
              required: false,
              hint: "e.g. author, journal, year",
            }
          - {
              label: "PDF",
              name: "file",
              widget: "file",
              media_library: { config: { max_file_size: 20000000 } },
            }
      - {
          label: "Survey link (Google Doc/Form)",
          name: "surveyUrl",
          widget: "string",
          required: false,
        }
      - {
          label: "Survey button label",
          name: "surveyLabel",
          widget: "string",
          required: false,
          default: "Share what you think",
        }

  - name: "pages"
    label: "Pages"
    media_folder: "/public/uploads/about"
    public_folder: "/uploads/about"
    files:
      - name: "about"
        label: "About page"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
              label: "Photo",
              name: "portrait",
              widget: "image",
              required: false,
              hint: "Optional headshot, shown at the top.",
            }
          - {
              label: "Body",
              name: "body",
              widget: "markdown",
              hint: "Write freely. Use the image button in the toolbar to drop pictures into the text.",
            }
          - label: "Links"
            name: "links"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
